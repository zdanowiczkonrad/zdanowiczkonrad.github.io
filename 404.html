<body bgcolor="#0a0805" text="#b08a4a" link="#e8b964" vlink="#e8b964" style="-webkit-font-smoothing: none;">
<center>
<br><pre id="art">          ┌───────────┐
          │           │
          │     ?     │
          │           │
          └───────────┘
   a door that opens onto nothing.</pre>
<div id="say"><p>This page does not exist.</p></div>
<br><font color="#5a4720"><small id="hint"></small></font>
<br><br><font color="#5a4720"><small><a href="/">return to the surface</a></small></font>
</center>
<script>
(function () {
  "use strict";
  var path = location.pathname || "";
  var seg = (path.split("/").pop() || "").replace(/\.html?$/i, "").toLowerCase();
  var inDescent = /\/descent\//i.test(path);

  /* the dark keeps only residues of its doors' names, never the names.
     a residue answers "is this a door?" — it cannot be read back into a map. */
  var REAL = {1639936471:1,582891740:1,1041047233:1,1895765415:1,1298228724:1,3597002208:1,949282827:1,509891127:1,3505096243:1,3294542361:1,2934979239:1,3363950675:1,1305451998:1,3740170413:1,3803770801:1,1549302358:1,1880808227:1,1121023878:1,303640695:1,3183871313:1,3854732713:1,3705110163:1,1889528983:1,285441362:1,3160476405:1,172308130:1,2929109865:1,130190656:1,2467158151:1,3741480476:1,784160972:1,1695111274:1,808037812:1,1247497263:1,802158640:1,3190084973:1,2419902460:1,911433122:1,3991686335:1,131357054:1,831774555:1,184058675:1,1286054023:1,2844630695:1,16239938:1,477794553:1,2521963737:1,3294061934:1,1217038295:1,3080081331:1,967510930:1,2857288653:1,149306833:1,63111256:1,3642941948:1,1990911110:1,4033539917:1,3545887409:1,1377670679:1,4112688116:1,2683253592:1,2695461577:1,2332870664:1,2784958016:1};
  var PAINTED = {3005037585:1,1132035554:1,2373514695:1};
  var NAMED = {115495960:1,2085890507:1,2710601869:1,795178040:1,1077094458:1,1516371626:1,1556813124:1,1537439663:1,2087764528:1,1546361170:1,2463380526:1,626823955:1,3717751985:1,2087771070:1,3937726892:1,1550973647:1,881586098:1,1121023878:1,1121645428:1,164300553:1,2087415716:1,3006831187:1,165459672:1,2087435909:1,1253070586:1,172308130:1,172300886:1,172462030:1,3916894296:1,2003872419:1,2087808326:1,1569741370:1,1600073190:1,2087821219:1,2088047855:1,3442444641:1,1837472442:1,1420805371:1,2087658553:1,2364942655:1,520027672:1,194454067:1,3929410381:1,1381539128:1,194927455:1,195776893:1,2088334738:1,195377206:1,196036493:1,2172846523:1,2980940030:1,2088344071:1,195170185:1,1945686358:1,4185235488:1,1911559056:1,1643785478:1,2017252524:1,1720200404:1,122496570:1,1968825430:1,2109493508:1,2088209963:1,2022968010:1};
  function hh(s) { var x = 5381 >>> 0; for (var i = 0; i < s.length; i++) { x = ((x * 33) ^ s.charCodeAt(i)) >>> 0; } return x; }
  function isReal(w) { return REAL[hh(w)] === 1; }

  var say = document.getElementById("say"), hint = document.getElementById("hint");
  if (!inDescent || !seg) {
    say.innerHTML = "<p>This page does not exist on <b>zdanowicz.dev</b>.</p>";
    hint.textContent = "the path you typed is not here.";
    return;
  }

  // count wrong tries
  var n = 0; try { n = (+localStorage.getItem("descent.404") || 0) + 1; localStorage.setItem("descent.404", n); } catch (e) {}

  if (PAINTED[hh(seg)] === 1) {
    say.innerHTML = "<p>Painted on. Your weight lands on cold wall.</p>";
    hint.textContent = "not this one. go back and push another.";
    return;
  }

  if (isReal(seg)) {
    say.innerHTML = "<p>That door is real — you only mistyped the way to it.</p>";
    hint.innerHTML = 'try <a href="/descent/' + seg + '.html">/descent/' + seg + '.html</a>';
    return;
  }

  // the right name without the right wax — every true door is sealed
  var wordPart = seg.replace(/-[a-z]{2}$/, "");
  if (NAMED[hh(wordPart)] === 1 || NAMED[hh(seg)] === 1) {
    if (seg.indexOf("-") < 0) {
      say.innerHTML = "<p>The name is right. The door is sealed.</p>";
      hint.textContent = "every true door is waxed. the room before it keeps the wax.";
    } else {
      say.innerHTML = "<p>The name is right. The wax is not.</p>";
      hint.textContent = "that stamp belongs to no room you have stood in. read the wax line again.";
    }
    return;
  }

  // a single letter off a real door?
  function oneOff(w) {
    if (w.length < 2 || w.length > 24) return false;
    var AB = "abcdefghijklmnopqrstuvwxyz0123456789-", i, j, c;
    for (i = 0; i < w.length; i++) if (isReal(w.slice(0, i) + w.slice(i + 1))) return true;
    for (i = 0; i < w.length; i++) for (j = 0; j < AB.length; j++) {
      c = AB[j];
      if (c !== w[i] && isReal(w.slice(0, i) + c + w.slice(i + 1))) return true;
    }
    for (i = 0; i <= w.length; i++) for (j = 0; j < AB.length; j++)
      if (isReal(w.slice(0, i) + AB[j] + w.slice(i))) return true;
    return false;
  }

  if (oneOff(seg)) {
    say.innerHTML = "<p>Close. The dark almost answers to that name.</p>";
    hint.textContent = "you are a single letter off a real door. check your decode again.";
  } else {
    say.innerHTML = "<p>Cold. Nothing in the dark goes by that name.</p>";
    hint.textContent = "that is not a door. go back and read the room you came from more carefully.";
  }

  // the current keeps count, and its patience has strata
  var deep = 0; try { deep = (JSON.parse(localStorage.getItem("descent.trace") || "{}").deep) || 0; } catch (e) {}
  if (n >= 4) hint.textContent += "  (" + n + " wrong doors so far — the way down is always a word you decode, never one you guess.)";
  if (n >= 8) {
    say.innerHTML += "<p>" + (deep >= 19
      ? "The big one guessed too, near the end. Whole rivers spent on guessing."
      : "You lean on a lot of walls.") + "</p>";
  }
  if (n >= 13) {
    hint.innerHTML += '<br><br>it relents, once: the room you fell from carries one image that is not decoration.'
      + '<br>it depicts the <i>turning</i> its name needs. read the picture, not the prose.';
  }
})();
</script>
